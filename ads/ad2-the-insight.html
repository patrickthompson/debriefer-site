<!DOCTYPE html>
<html><head>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
body { margin: 0; padding: 0; background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.ad { width: 1080px; height: 1080px; background: #0a0f0d; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }

.content { text-align: center; max-width: 780px; padding: 0 60px; }
.quote { font-family: 'Playfair Display', serif; color: #e4e8e6; font-size: 48px; font-style: italic; line-height: 1.5; margin-bottom: 50px; }
.quote em { color: #10b981; font-style: italic; }

.line { width: 60px; height: 2px; background: #10b981; opacity: 0.4; margin: 0 auto 40px; }

.cta { font-family: 'DM Sans', sans-serif; color: #8a9690; font-size: 24px; line-height: 1.6; }

.footer { position: absolute; bottom: 40px; font-family: 'DM Sans', sans-serif; font-size: 20px; color: #10b981; letter-spacing: 0.05em; font-weight: 500; }
</style></head><body>
<div class="ad">
    <!-- Goose -->
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" style="width: 120px; height: 120px; margin-bottom: 40px;">
        <circle cx="32" cy="32" r="30" fill="#0a0f0d" stroke="#10b981" stroke-width="2"/>
        <circle cx="22" cy="26" r="3" fill="#10b981"/>
        <circle cx="42" cy="26" r="3" fill="#10b981"/>
        <path d="M26 36 L32 45 L38 36" fill="#10b981"/>
        <path d="M27 36 L37 36" stroke="#10b981" stroke-width="2.5"/>
    </svg>
    <div class="content">
        <div class="quote">The people with the most <em>institutional knowledge</em> have the least time to <em>organize it.</em></div>
        <div class="line"></div>
        <div class="cta">The story is in your inbox. We bring it out.</div>
    </div>
    <div class="footer">debriefer.io</div>
</div>
</body></html>
