<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64">
  <!-- Option 3: Magnifying glass over document lines — "finding the story" -->
  <g transform="translate(6, 6)">
    <!-- Document lines -->
    <line x1="10" y1="10" x2="36" y2="10" stroke="#e4e8e6" stroke-width="1.5" opacity="0.15"/>
    <line x1="10" y1="18" x2="34" y2="18" stroke="#e4e8e6" stroke-width="1.5" opacity="0.15"/>
    <line x1="10" y1="26" x2="38" y2="26" stroke="#e4e8e6" stroke-width="1.5" opacity="0.15"/>
    <line x1="10" y1="34" x2="32" y2="34" stroke="#e4e8e6" stroke-width="1.5" opacity="0.15"/>
    <line x1="10" y1="42" x2="36" y2="42" stroke="#e4e8e6" stroke-width="1.5" opacity="0.15"/>
    <!-- Magnifying glass -->
    <circle cx="30" cy="28" r="12" fill="none" stroke="#10b981" stroke-width="2"/>
    <line x1="39" y1="37" x2="48" y2="46" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Highlighted line inside glass -->
    <line x1="20" y1="26" x2="38" y2="26" stroke="#10b981" stroke-width="2" opacity="0.8"/>
    <circle cx="20" cy="26" r="2" fill="#10b981"/>
  </g>
  <text x="58" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="600" fill="#e4e8e6" letter-spacing="-0.5">debriefer<tspan font-weight="300" fill="#10b981">.io</tspan></text>
</svg>
