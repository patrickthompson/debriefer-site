<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64">
  <!-- Option 5: Chat bubble transforming into timeline — the conversion metaphor -->
  <g transform="translate(4, 4)">
    <!-- Chat bubble (left half) -->
    <path d="M4 12 C4 8 8 4 12 4 L24 4 L24 36 L12 36 C8 36 4 32 4 28 Z" fill="#121a16" stroke="#10b981" stroke-width="1.5"/>
    <!-- Chat bubble tail -->
    <path d="M12 36 L8 44 L18 36" fill="#121a16" stroke="#10b981" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Chat lines inside bubble -->
    <line x1="10" y1="14" x2="20" y2="14" stroke="#10b981" stroke-width="1.2" opacity="0.4"/>
    <line x1="10" y1="20" x2="18" y2="20" stroke="#10b981" stroke-width="1.2" opacity="0.4"/>
    <line x1="10" y1="26" x2="21" y2="26" stroke="#10b981" stroke-width="1.2" opacity="0.4"/>
    <!-- Arrow -->
    <path d="M26 20 L32 20" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M30 16 L34 20 L30 24" fill="none" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
    <!-- Timeline (right half) -->
    <line x1="38" y1="6" x2="38" y2="46" stroke="#10b981" stroke-width="2" opacity="0.4"/>
    <circle cx="38" cy="10" r="3" fill="#10b981" opacity="0.5"/>
    <circle cx="38" cy="24" r="3" fill="#10b981" opacity="0.7"/>
    <circle cx="38" cy="38" r="3" fill="#10b981" opacity="0.95"/>
    <line x1="43" y1="10" x2="52" y2="10" stroke="#e4e8e6" stroke-width="1.2" opacity="0.25"/>
    <line x1="43" y1="24" x2="50" y2="24" stroke="#e4e8e6" stroke-width="1.2" opacity="0.4"/>
    <line x1="43" y1="38" x2="52" y2="38" stroke="#e4e8e6" stroke-width="1.2" opacity="0.55"/>
  </g>
  <text x="58" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="600" fill="#e4e8e6" letter-spacing="-0.5">debriefer<tspan font-weight="300" fill="#10b981">.io</tspan></text>
</svg>
